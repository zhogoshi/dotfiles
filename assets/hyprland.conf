# --- SETUP MODE BINDS ---
$mod = SUPER
$terminal = kitty
bind = $mod, Return, exec, $terminal
bind = $mod, Q, killactive
bind = $mod, F, exec, firefox
bind = $mod, K, exec, Throne
# ------------------------

# --- USER OVERRIDES ---
input {
    kb_layout = us
    kb_options = grp:alt_shift_toggle
}

misc {
    disable_autoreload = false
}
# ----------------------
